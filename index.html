<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <header>
      <h1 id="title">[Your title or logo]</h1>
      <nav>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About Me</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
      <div class="resume">
        <a
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          title="View my resume"
          >Resume</a
        >
      </div>
    </header>

    <main>
      <section id="home">
        <div class="home-img">
          <img src="/images/Me-removebg-preview.png" alt="my-image" />
        </div>
        <div class="home-content">
          <h2 id="my-name">I'm [Your Name]</h2>
          <p id="my-intro">[Your brief introduction or tagline goes here.]</p>
          <div class="socials">
            <a
              href="https://www.instagram.com/chaaa.rlss/"
              target="_blank"
              rel="noopener noreferrer"
              title="Visit my Instagram profile"
              ><i class="fa-brands fa-instagram"></i
            ></a>

            <a
              href="https://web.facebook.com/CharlesMcVigo"
              target="_blank"
              rel="noopener noreferrer"
              title="Visit my Facebook profile"
              ><i class="fa-brands fa-facebook"></i>
            </a>

            <a
              href="https://www.linkedin.com/in/charles-mc-vigo-abb6a8363/"
              target="_blank"
              rel="noopener noreferrer"
              title="Visit my LinkedIn profile"
            >
              <i class="fa-brands fa-linkedin"></i>
            </a>
            <div class="viber-contact">
              <p>Message me through Viber:  <span id="viber-number">[Your Viber number here]</span></p>
            </div>
          </div>
        </div>
      </section>
      <section id="about">
        <!-- About -->
      </section>
      <section id="projects">
        <!-- Projects -->
      </section>
      <section id="contact">
        <!-- Contact -->
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
